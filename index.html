<!DOCTYPE html>
<html lang="ru">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Метрики звонка</title>

<style>
:root {
  --bg: #ffffff;
  --text: #000000;
  --border: #d1d1d6;
  --input-bg: #ffffff;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000000;
    --text: #ffffff;
    --border: #3a3a3c;
    --input-bg: #2c2c2e;
  }
}

body {
  font-family: -apple-system, BlinkMacSystemFont, Arial;
  max-width: 500px;
  margin: 20px auto;
  padding: 16px;
  background: var(--bg);
  color: var(--text);
}

.header {
  text-align: center;
  margin-bottom: 20px;
}

.header img {
  width: 100%;
  max-width: 220px;
  border-radius: 24px;
  padding: 6px;
}

select, input, textarea {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--input-bg);
  color: var(--text);
}

button {
  width: 100%;
  padding: 16px;
  margin-top: 16px;
  border-radius: 12px;
  border: none;
  background: #0a84ff;
  color: white;
  cursor: pointer;
}

#clearPhone {
  display: none;
  background: #8e8e93;
}

.error {
  border-color: red;
}

#status {
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">
  <img id="logo" src="logo-dark.png">
  <h2>Метрики звонка</h2>
</div>

<select id="manager">
  <option>Максакова Анна</option>
  <option>Вискарев Дмитрий</option>
  <option>Корчагин Андрей</option>
  <option>Кочнев Алексей</option>
  <option>Савушкин Константин</option>
  <option>Ахатов Руслан</option>
  <option>Александр Сервис</option>
</select>

<input id="phone" type="tel" placeholder="+7 (___) ___-__-__">
<button id="clearPhone" type="button">Очистить номер</button>

<select id="result">
  <option>iPhone 17</option>
  <option>iPhone 17 Pro</option>
  <option>iPhone 17 Pro Max</option>
  <option>iPhone 16</option>
  <option>iPhone 15</option>
  <option>Слив</option>
  <option>Отказ</option>
</select>

<textarea id="comment" placeholder="Вопрос клиента"></textarea>

<select id="next_action">
  <option>Заказ в Битрикс24</option>
  <option>Вопрос решен</option>
  <option>Перезвонить</option>
  <option>Свяжется позже</option>
  <option>Слив</option>
</select>

<input id="next_contact_at" type="datetime-local">

<button id="sendBtn" type="button">Сохранить</button>

<p id="status"></p>

<script>
const WEBHOOK = 'https://script.google.com/macros/s/AKfycbwCAitlunN0dr5W9JcjoqSA4osxla1mTXm5J1kD_hCZ4pMyYqs4fg2Nfq5f5QvWjuk/exec';

const phone = document.getElementById('phone');
const clearBtn = document.getElementById('clearPhone');
const btn = document.getElementById('sendBtn');
const status = document.getElementById('status');

// --- маска
phone.addEventListener('input', () => {
  let v = phone.value.replace(/\D/g, '');

  if (v.startsWith('8')) v = '7' + v.slice(1);
  if (!v.startsWith('7')) v = '7' + v;

  let res = '+7';

  if (v.length > 1) res += ' (' + v.slice(1,4);
  if (v.length >= 5) res += ') ' + v.slice(4,7);
  if (v.length >= 8) res += '-' + v.slice(7,9);
  if (v.length >= 10) res += '-' + v.slice(9,11);

  phone.value = res;
  clearBtn.style.display = phone.value ? 'block' : 'none';
});

// --- очистка
clearBtn.onclick = () => {
  phone.value = '';
  phone.focus();
  clearBtn.style.display = 'none';
};

// --- отправка
btn.onclick = async () => {
  btn.disabled = true;
  status.textContent = 'Отправка...';

  const cleanPhone = phone.value.replace(/\D/g, '');
  const comment = document.getElementById('comment').value.trim();

  if (cleanPhone.length < 11) {
    phone.classList.add('error');
    status.textContent = 'Неверный номер';
    btn.disabled = false;
    return;
  }

  if (!comment) {
    status.textContent = 'Введите комментарий';
    btn.disabled = false;
    return;
  }

  const data = {
    manager: document.getElementById('manager').value,
    phone: cleanPhone,
    result: document.getElementById('result').value,
    comment: comment,
    next_action: document.getElementById('next_action').value,
    next_contact_at: document.getElementById('next_contact_at').value
  };

  try {
    const res = await fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    const text = await res.text();
    let json = {};

    try { json = JSON.parse(text); } catch {}

    if (json.success) {
      status.textContent = 'Сохранено';
      phone.value = '';
      document.getElementById('comment').value = '';
      document.getElementById('next_contact_at').value = '';
      clearBtn.style.display = 'none';

      setTimeout(() => history.back(), 1000);
    } else {
      status.textContent = 'Ошибка сервера';
    }

  } catch (e) {
    status.textContent = 'Ошибка сети';
  }

  btn.disabled = false;
};
</script>

</body>
</html>
