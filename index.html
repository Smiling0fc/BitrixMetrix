<!DOCTYPE html>
<html lang="ru">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Метрики звонка</title>

  <style>
    :root {
      --bg: #ffffff;
      --text: #000000;
      --card: #f2f2f7;
      --border: #d1d1d6;
      --input-bg: #ffffff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --text: #ffffff;
        --card: #1c1c1e;
        --border: #3a3a3c;
        --input-bg: #2c2c2e;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, Arial;
      max-width: 500px;
      margin: 20px auto;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
    }

    h2 {
      margin-bottom: 16px;
    }

    select, input, textarea {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      font-size: 16px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 16px;
      margin-top: 16px;
      border-radius: 12px;
      border: none;
      background: #0a84ff; /* iOS blue */
      color: white;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
    }

    button:active {
      opacity: 0.8;
    }

    #status {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.8;
    }

  </style>
</head>

<body>

<h2>Метрики звонка</h2>

<select id="manager">
  <option>Максакова Анна</option>
  <option>Вискарев Дмитрий</option>
  <option>Корчагин Андрей</option>
  <option>Кочнев Алексей</option>
  <option>Савушкин Константин</option>
  <option>Ахатов Руслан</option>
  <option>Александр Сервис</option>
</select>

<input id="phone" placeholder="Телефон">

<select id="result">
  <option>iPhone 17</option>
  <option>iPhone Air</option>
  <option>iPhone 17 Pro</option>
  <option>iPhone 17 Pro Max</option>
  <option>iPhone 16</option>
  <option>iPhone 16 Plus</option>
  <option>iPhone 16 Pro</option>
  <option>iPhone 16 Pro Max</option>
  <option>iPhone 15</option>
  <option>iPhone 15 Plus</option>
  <option>iPhone 14</option>
  <option>iPhone 13</option>
  <option>iPad A16</option>
  <option>iPad Air M3 11</option>
  <option>iPad Pro M4 11</option>
  <option>iPad Air M3 13</option>
  <option>iPad Pro M4 13</option>
  <option>iPad Air M4 11</option>
  <option>iPad Pro M5 11</option>
  <option>iPad Air M4 13</option>
  <option>iPad Pro M5 13</option>
  <option>MacBook Air M2 13</option>
  <option>MacBook Air M2 15</option>
  <option>MacBook Air M3 13</option>
  <option>MacBook Air M3 15</option>
  <option>MacBook Pro M5 14</option>
  <option>MacBook Pro M5 16</option>
  <option>MacBook Air M4 13</option>
  <option>MacBook Air M4 15</option>
  <option>MacBook Pro M4 14</option>
  <option>MacBook Pro M4 Pro 16</option>
  <option>MacBook Air M5 13</option>
  <option>MacBook Air M5 15</option>
  <option>MacBook Neo 13</option>
  <option>Apple Watch SE 2</option>
  <option>Apple Watch SE 3</option>
  <option>Apple Watch Series 10 42mm</option>
  <option>Apple Watch Series 10 46mm</option>
  <option>Apple Watch Series 11 42mm</option>
  <option>Apple Watch Series 11 46mm</option>
  <option>Apple Watch Ultra 2 49mm</option>
  <option>Apple Watch Ultra 3 49mm</option>
  <option>Apple Pencil Lightning</option>
  <option>Apple Pencil Type-C</option>
  <option>Apple Pencil 2</option>
  <option>Apple Pencil Pro</option>
  <option>Apple Magic Keyboard</option>
  <option>Нецелевой звонок</option>
  <option>Установить приложения</option>
  <option>Перезвонить</option>
  <option>Слив</option>
  <option>Отказ</option>
</select>

<textarea id="comment" placeholder="Вопрос клиента"></textarea>

<select id="next_action">
  <option>Заказ в Битрикс24</option>
  <option>Вопрос решен</option>
  <option>Перезвонить</option>
  <option>Свяжется позже</option>
  <option>Перевод на ТРЦ</option>
  <option>Слив</option>
  <option>Негативный клиент</option>
</select>

<input id="next_contact_at" type="datetime-local">

<button onclick="send()">Сохранить</button>

<p id="status"></p>

<script>
const WEBHOOK = 'https://script.google.com/macros/s/AKfycbwCAitlunN0dr5W9JcjoqSA4osxla1mTXm5J1kD_hCZ4pMyYqs4fg2Nfq5f5QvWjuk/exec';

function getParam(name) {
  return new URL(window.location.href).searchParams.get(name) || '';
}

window.onload = () => {
  document.getElementById('manager').value = getParam('manager');
  document.getElementById('phone').value = getParam('phone');
};

async function send() {
  const data = {
    manager: document.getElementById('manager').value,
    phone: document.getElementById('phone').value,
    result: document.getElementById('result').value,
    comment: document.getElementById('comment').value,
    next_action: document.getElementById('next_action').value,
    next_contact_at: document.getElementById('next_contact_at').value
  };

  const status = document.getElementById('status');
  status.innerText = 'Отправка...';

  try {
    const res = await fetch(WEBHOOK, {
      method: 'POST',
      body: JSON.stringify(data)
    });

    const json = await res.json();

    status.innerText = json.success ? 'Сохранено' : 'Ошибка';

  } catch (e) {
    status.innerText = 'Ошибка сети';
  }
}
</script>

</body>
</html>
