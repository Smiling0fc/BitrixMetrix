<!DOCTYPE html>
<html lang="ru">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Метрики звонка</title>

  <style>
    :root {
      --bg: #ffffff;
      --text: #000000;
      --border: #d1d1d6;
      --input-bg: #ffffff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --text: #ffffff;
        --border: #3a3a3c;
        --input-bg: #2c2c2e;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, Arial;
      max-width: 500px;
      margin: 20px auto;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
    }
    .menu-btn {
    position: fixed;
    top: 12px;
    left: 12px;
    font-size: 22px;
    cursor: pointer;
    z-index: 1000;
    padding: 6px 10px;
    }
    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header img {
      width: 100%;
      max-width: 220px;
      height: auto;
      border-radius: 24px;
      padding: 6px;
      object-fit: contain;
      margin-bottom: 4px;
    }

    .header h2 {
      margin: 0;
    }

    select, input, textarea {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      font-size: 16px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 16px;
      margin-top: 16px;
      border-radius: 12px;
      border: none;
      background: #0a84ff;
      color: white;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.1s ease, opacity 0.1s ease;
    }

    button:active {
      transform: scale(0.97);
      opacity: 0.8;
    }

    #status {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.8;
    }
    .error {
      border-color: red;
    }
  </style>
</head>

<body>
<div class="menu-btn" onclick="goToChats()">☰</div>

<div class="header">
  <img id="logo" src="logo-dark.png" alt="logo">

</div>

<select id="manager">

  <option>Корчагин Андрей</option>

  <option>Савушкин Константин</option>
  <option>Ахатов Руслан</option>
  <option>Александр Сервис</option>
</select>

<input 
  id="phone" 
  type="tel" 
  inputmode="numeric" 
  placeholder="+7 (___) ___-__-__">

<select id="result">

  <option>iPhone 17 Pro Max</option>
  <option>iPhone 16</option>
  <option>iPhone 16 Plus</option>

  <option>iPhone 16 Pro Max</option>

  <option>iPhone 15 Plus</option>
  <option>iPhone 14</option>
  <option>iPhone 13</option>
  <option>iPad A16</option>
  <option>iPad Air M3 11</option>
  <option>iPad Pro M4 11</option>
  <option>iPad Air M3 13</option>
  <option>iPad Pro M4 13</option>
  <option>iPad Air M4 11</option>
  <option>iPad Pro M5 11</option>
  <option>iPad Air M4 13</option>
  <option>iPad Pro M5 13</option>
  <option>MacBook Air M2 13</option>
  <option>MacBook Air M2 15</option>
  <option>MacBook Air M3 13</option>
  <option>MacBook Air M3 15</option>
  <option>MacBook Pro M5 14</option>
  <option>MacBook Pro M5 16</option>
  <option>MacBook Air M4 13</option>
  <option>MacBook Air M4 15</option>
  <option>MacBook Pro M4 14</option>
  <option>MacBook Pro M4 Pro 16</option>
  <option>MacBook Air M5 13</option>
  <option>MacBook Air M5 15</option>
  <option>MacBook Neo 13</option>
  <option>Apple Watch SE 2</option>
  <option>Apple Watch SE 3</option>

  <option>Apple Watch Series 10 46mm</option>
  <option>Apple Watch Series 11 42mm</option>

  <option>Apple Watch Ultra 2 49mm</option>
  <option>Apple Watch Ultra 3 49mm</option>

</select>

<textarea id="comment" placeholder="Вопрос клиента"></textarea>

<select id="next_action">
  <option>Заказ в Битрикс24</option>
  <option>Вопрос решен</option>
  <option>Перезвонить</option>
  <option>Свяжется позже</option>
  <option>Перевод на ТРЦ</option>
  <option>Перевод на сервис</option>
  <option>Слив</option>
  <option>Негативный клиент</option>
</select>

<input id="next_contact_at" type="datetime-local">
  
  
<button onclick="send()">Сохранить</button>

<p id="status"></p>

<script>
const WEBHOOK = 'https://script.google.com/macros/s/AKfycbwCAitlunN0dr5W9JcjoqSA4osxla1mTXm5J1kD_hCZ4pMyYqs4fg2Nfq5f5QvWjuk/exec';

function getParam(name) {
  return new URL(window.location.href).searchParams.get(name) || '';
}

function updateLogo() {
  const logo = document.getElementById('logo');
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  logo.src = isDark ? 'logo-light.png' : 'logo-dark.png';
}

document.addEventListener('DOMContentLoaded', () => {
  const phoneInput = document.getElementById('phone');

  document.getElementById('manager').value = getParam('manager');
  phoneInput.value = getParam('phone');
  phoneInput.focus();

  // МАСКА
  phoneInput.addEventListener('input', function () {
    let value = this.value.replace(/\D/g, '');

    if (value.startsWith('8')) value = '7' + value.slice(1);
    if (!value.startsWith('7')) value = '7' + value;

    let formatted = '+7';

    if (value.length > 1) {
      formatted += ' (' + value.substring(1, 4);
    }
    if (value.length >= 5) {
      formatted += ') ' + value.substring(4, 7);
    }
    if (value.length >= 8) {
      formatted += '-' + value.substring(7, 9);
    }
    if (value.length >= 10) {
      formatted += '-' + value.substring(9, 11);
    }

    this.value = formatted;
  });

  updateLogo();
});

window.matchMedia('(prefers-color-scheme: dark)')
  .addEventListener('change', updateLogo);

async function send() {
  const btn = document.querySelector('button');
  const status = document.getElementById('status');
  const phoneEl = document.getElementById('phone');

  btn.disabled = true;

  const rawPhone = phoneEl.value;
  const cleanPhone = rawPhone.replace(/\D/g, '');
  const comment = document.getElementById('comment').value;

  if (cleanPhone.length < 11) {
    phoneEl.classList.add('error');
    status.innerText = 'Введите корректный номер';
    btn.disabled = false;
    return;
  } else {
    phoneEl.classList.remove('error');
  }

  if (!comment.trim()) {
    status.innerText = 'Введите вопрос клиента';
    btn.disabled = false;
    return;
  }

  const data = {
    manager: document.getElementById('manager').value,
    phone: cleanPhone,
    result: document.getElementById('result').value,
    comment: comment,
    next_action: document.getElementById('next_action').value,
    next_contact_at: document.getElementById('next_contact_at').value
  };

  status.innerText = 'Отправка...';

  try {
    const res = await fetch(WEBHOOK, {
      method: 'POST',
      body: JSON.stringify(data)
      });

    if (!res.ok) throw new Error();

    const json = await res.json();

    if (json.success) {
      status.innerText = 'Сохранено';

      setTimeout(() => {
        document.getElementById('comment').value = '';
        phoneEl.value = '';
        document.getElementById('next_contact_at').value = '';
      }, 500);

      setTimeout(() => history.back(), 1200);
    } else {
      status.innerText = 'Ошибка';
    }

  } catch {
    status.innerText = 'Ошибка сети';
  }

  btn.disabled = false;
}
</script>
</body>
</html>
